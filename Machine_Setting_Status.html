<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マシン状態一覧</title>
<style>
:root {
  --bg:     #0d0d1a;
  --sur:    #12122a;
  --sur2:   #1a1a3a;
  --acc:    #e94560;
  --acc2:   #0f2d5a;
  --text:   #dde6f0;
  --dim:    #7a90a8;
  --green:  #34d399;
  --red:    #f87171;
  --orange: #fb923c;
  --blue:   #60a5fa;
  --purple: #c084fc;
  --border: #1e2a3a;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Segoe UI','Meiryo',system-ui,sans-serif;
  background: var(--bg); color: var(--text); font-size: 13px; }
body { display: flex; flex-direction: column; overflow: hidden; }

/* ── Settings overlay ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.65); z-index: 200;
  justify-content: center; align-items: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--sur); border: 1px solid var(--acc2);
  border-radius: 8px; padding: 28px 32px;
  width: min(480px, 94vw); max-height: 90vh; overflow-y: auto;
}
.modal h2 { font-size: 16px; color: var(--acc); margin-bottom: 20px; }
.form-row { margin-bottom: 14px; }
.form-row label { display: block; color: var(--dim); font-size: 12px; margin-bottom: 5px; }
.form-row input { width: 100%; }
.modal-note { font-size: 11px; color: var(--dim); margin-top: 16px; line-height: 1.6; }
.modal-note a { color: var(--blue); }
.modal-btns { display: flex; gap: 8px; margin-top: 20px; }
.conn-status {
  font-size: 12px; padding: 6px 0; margin-top: 10px;
  display: flex; align-items: center; gap: 6px;
}
.conn-dot-sm {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
}

/* ── Header ── */
.header {
  background: var(--sur); border-bottom: 2px solid var(--acc);
  padding: 0 18px; height: 50px;
  display: flex; align-items: center; gap: 12px; flex-shrink: 0;
}
.header h1 { font-size: 17px; color: var(--acc); white-space: nowrap; }
.ts-badge {
  font-size: 11px; color: var(--dim); white-space: nowrap; flex-shrink: 0;
}
.countdown {
  font-size: 11px; color: var(--dim); white-space: nowrap;
  background: var(--sur2); padding: 2px 10px; border-radius: 10px; flex-shrink: 0;
}
.header-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

/* ── Config bar (GAS URL + token) ── */
.config-bar {
  background: var(--sur2); border-bottom: 1px solid var(--border);
  padding: 8px 18px; display: flex; align-items: center; gap: 10px;
  flex-shrink: 0; flex-wrap: wrap;
}
.config-bar label { color: var(--dim); font-size: 12px; white-space: nowrap; }
.gas-indicator {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--dim); white-space: nowrap;
}
.gas-ok   { color: var(--green); }
.gas-none { color: var(--red); }

/* ── Inputs / buttons ── */
input[type="text"], input[type="password"], select, textarea {
  background: var(--acc2); border: 1px solid #1d3a5a; color: var(--text);
  padding: 5px 10px; border-radius: 4px; font-size: 13px;
  font-family: inherit; outline: none; transition: border-color .15s;
}
input:focus, select:focus { border-color: var(--acc); }
.btn {
  background: var(--acc); color: #fff; border: none;
  padding: 5px 14px; border-radius: 4px; cursor: pointer;
  font-size: 13px; font-family: inherit; white-space: nowrap;
  transition: background .15s, opacity .15s;
}
.btn:hover    { background: #c73450; }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-muted { background: var(--acc2); border: 1px solid #1d3a5a; }
.btn-muted:hover { background: #174070; }
.btn-sm { padding: 3px 10px; font-size: 12px; }

/* ── Filter bar ── */
.filter-bar {
  background: var(--sur); border-bottom: 1px solid var(--border);
  padding: 7px 18px; display: flex; align-items: center; gap: 12px;
  flex-shrink: 0; flex-wrap: wrap;
}
.filter-bar label { color: var(--dim); font-size: 12px; }

/* ── Stats bar ── */
.stats-bar {
  background: var(--sur); border-bottom: 1px solid var(--border);
  padding: 7px 18px; display: flex; gap: 10px; align-items: center;
  flex-shrink: 0; flex-wrap: wrap;
}
.stat {
  display: flex; align-items: center; gap: 6px;
  padding: 3px 12px; border-radius: 20px;
  background: var(--sur2); font-size: 12px; color: var(--dim);
}
.stat-num { font-weight: 700; font-size: 15px; color: var(--text); }

/* ── Alert ── */
.alert {
  margin: 10px 18px; padding: 9px 14px; border-radius: 5px;
  font-size: 13px; flex-shrink: 0;
}
.alert-error { background: #3b0e0e; color: var(--red); border-left: 3px solid var(--red); }

/* ── Table wrapper ── */
.table-wrapper { flex: 1; overflow: auto; padding: 14px 18px; }

/* ── Empty / loading ── */
.empty-state { text-align: center; padding: 60px 20px; color: var(--dim); }
.spinner {
  width: 34px; height: 34px;
  border: 3px solid #2a3a4a; border-top-color: var(--acc);
  border-radius: 50%; animation: spin .75s linear infinite;
  margin: 0 auto 14px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Table ── */
table { border-collapse: collapse; width: 100%; min-width: 1400px; }
thead th {
  background: var(--acc2); color: var(--blue);
  padding: 9px 10px; text-align: left; font-weight: 600; font-size: 12px;
  border-bottom: 2px solid var(--acc); white-space: nowrap;
  position: sticky; top: 0; z-index: 10;
}
tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
tbody tr:hover { background: var(--sur2); }
td { padding: 6px 10px; vertical-align: top; }

/* Column widths */
.col-booth    { min-width: 80px; }
.col-type     { min-width: 48px; }
.col-gameplay { min-width: 110px; }
.col-mode     { min-width: 56px; }
.col-dir      { min-width: 56px; }
.col-state { min-width: 80px; }
.col-conn  { min-width: 80px; }
.col-err   { min-width: 110px; max-width: 180px; }
.col-res   { min-width: 60px; }
.col-edit  { min-width: 160px; width: 200px; }

/* Cell styles */
.booth-id { font-size: 15px; font-weight: 700; color: var(--blue); white-space: nowrap; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
.badge-free  { background: #052e16; color: var(--green); }
.badge-maint { background: #3b0e0e; color: var(--red); }
.badge-play  { background: #431407; color: var(--orange); }
.conn-wrap { display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
.conn-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot-conn  { background: var(--green); box-shadow: 0 0 5px #34d399aa; }
.dot-disc  { background: var(--red); }
.no-err    { color: #3a5a4a; font-size: 12px; }
.has-err   { color: var(--orange); font-size: 11px; word-break: break-word; white-space: normal; }
.type-two   { color: var(--blue);   font-weight: 600; }
.type-three { color: var(--purple); font-weight: 600; }
.dir-left   { color: var(--green); }
.dir-right  { color: var(--orange); }
.res-yes { color: var(--purple); font-size: 12px; }
.res-no  { color: #2a3a4a; font-size: 12px; }
.mode-pve { color: var(--blue);   font-size: 11px; font-weight: 600; }
.mode-pvp { color: var(--orange); font-size: 11px; font-weight: 600; }

/* Editable textarea */
.editable {
  width: 100%; min-height: 38px;
  background: #08101a; border: 1px solid #1e2e3e; border-radius: 3px;
  padding: 4px 7px; color: var(--text); font-size: 12px; font-family: inherit;
  resize: vertical; outline: none; display: block; transition: border-color .15s;
}
.editable:focus { border-color: var(--acc); background: #0a1220; }
@keyframes flash-green {
  0%   { border-color: var(--green); box-shadow: 0 0 4px var(--green); }
  100% { border-color: #1e2e3e; box-shadow: none; }
}
.editable.saved { animation: flash-green 1.2s ease forwards; }

/* API settings cell */
.col-admin-settings { min-width: 180px; width: 200px; }
.admin-settings-cell {
  font-size: 10px; color: var(--text);
  white-space: pre; max-height: 86px; overflow-y: auto;
  font-family: 'Consolas','Courier New',monospace;
  background: #08101a; border: 1px solid #1e2e3e;
  border-radius: 3px; padding: 4px 7px; line-height: 1.5;
}

/* Timestamp under field */
.field-ts { font-size: 10px; color: var(--dim); margin-top: 2px; min-height: 14px; }

/* Conflict box */
.conflict-box {
  margin-top: 5px; background: #2c1400;
  border: 1px solid var(--orange); border-radius: 4px;
  padding: 6px 8px; font-size: 11px;
}
.cf-header   { color: var(--orange); font-weight: 600; margin-bottom: 4px; }
.cf-server-val {
  color: var(--text); background: #111; border-radius: 3px;
  padding: 3px 6px; margin-bottom: 6px;
  word-break: break-word; white-space: pre-wrap;
  max-height: 60px; overflow-y: auto; font-size: 11px;
}
.cf-btns { display: flex; gap: 6px; }
.btn-cf { padding: 3px 8px; font-size: 11px; border: none; border-radius: 3px; cursor: pointer; font-family: inherit; }
.btn-cf-force  { background: var(--acc);  color: #fff; }
.btn-cf-force:hover  { background: #c73450; }
.btn-cf-revert { background: var(--acc2); color: var(--text); border: 1px solid #1d3a5a; }
.btn-cf-revert:hover { background: #174070; }
</style>
</head>
<body>

<!-- ── Settings Modal ── -->
<div class="overlay" id="settingsOverlay">
  <div class="modal">
    <h2>⚙ 設定</h2>

    <div class="form-row">
      <label>GAS Web App URL</label>
      <input type="text" id="gasUrlInput"
        placeholder="https://script.google.com/macros/s/.../exec"
        style="width:100%;">
    </div>

    <div class="form-row">
      <label>APIトークン <span style="color:var(--dim);font-size:11px">(設定済みの場合は変更時のみ)</span></label>
      <input type="password" id="tokenSettingInput" placeholder="Bearer Token">
    </div>

    <div class="conn-status" id="connStatus"></div>

    <div class="modal-btns">
      <button class="btn" id="saveSettingsBtn" onclick="saveSettings()">保存して接続テスト</button>
      <button class="btn btn-muted" id="closeSettingsBtn" onclick="closeSettings()" style="display:none;">閉じる</button>
    </div>

    <div class="modal-note">
      GAS のデプロイ設定:<br>
      ・実行ユーザー: <strong>自分</strong><br>
      ・アクセス: <strong>全員（匿名を含む）</strong>
    </div>
  </div>
</div>

<!-- ── Header ── -->
<div class="header">
  <h1>マシン状態一覧</h1>
  <span class="ts-badge" id="lastUpdated"></span>
  <span class="countdown" id="countdown"></span>
  <div class="header-right">
    <button class="btn btn-muted btn-sm" id="fetchBtn" onclick="fetchAndUpdate()">データ取得</button>
    <button class="btn btn-muted btn-sm" id="fetchSettingsBtn" onclick="fetchAdminSettings()">設定値更新</button>
    <button class="btn btn-muted btn-sm" onclick="openSettings()">⚙ 設定</button>
    <button class="btn btn-muted btn-sm" onclick="exportCSV()">CSV 出力</button>
  </div>
</div>

<!-- ── Filter bar ── -->
<div class="filter-bar" id="filterBar" style="display:none;">
  <label>グループ:</label>
  <select id="fGroup" onchange="applyFilters()"><option value="">全て</option></select>
  <label>状態:</label>
  <select id="fState" onchange="applyFilters()">
    <option value="">全て</option>
    <option value="FREE">空き</option>
    <option value="UNDER_MAINTENANCE">メンテ中</option>
  </select>
  <label>接続:</label>
  <select id="fConn" onchange="applyFilters()">
    <option value="">全て</option>
    <option value="CONNECTED">接続中</option>
    <option value="DISCONNECTED">切断</option>
  </select>
  <label>タイプ:</label>
  <select id="fType" onchange="applyFilters()">
    <option value="">全て</option>
    <option value="TWO_CLAWS">2爪</option>
    <option value="THREE_CLAWS">3爪</option>
  </select>
</div>

<!-- ── Stats bar ── -->
<div class="stats-bar" id="statsBar" style="display:none;">
  <div class="stat">合計 <span class="stat-num" id="sTotal">0</span></div>
  <div class="stat" style="border-left:2px solid var(--green)">空き <span class="stat-num" style="color:var(--green)" id="sFree">0</span></div>
  <div class="stat" style="border-left:2px solid var(--red)">メンテ中 <span class="stat-num" style="color:var(--red)" id="sMaint">0</span></div>
  <div class="stat" style="border-left:2px solid var(--blue)">接続中 <span class="stat-num" style="color:var(--blue)" id="sConn">0</span></div>
  <div class="stat" style="border-left:2px solid var(--red)">切断 <span class="stat-num" style="color:var(--red)" id="sDisc">0</span></div>
</div>

<div id="alertBox" class="alert alert-error" style="display:none;"></div>

<!-- ── Table ── -->
<div class="table-wrapper">
  <div class="empty-state" id="emptyState">
    <div class="spinner" id="spinner" style="display:none;"></div>
    <p id="emptyMsg">⚙ ボタンから GAS URL を設定してください</p>
  </div>
  <table id="mainTable" style="display:none;">
    <thead>
      <tr>
        <th class="col-booth">ブース番号</th>
        <th class="col-type">タイプ</th>
        <th class="col-gameplay">遊び方名</th>
        <th class="col-mode">モード</th>
        <th class="col-dir">向き</th>
        <th class="col-state">マシン状態</th>
        <th class="col-conn">接続状態</th>
        <th class="col-err">エラーコード</th>
        <th class="col-res">ストリーマー<br>予約</th>
        <th class="col-edit">メモ</th>
        <th class="col-admin-settings">設定値<br>(管理パネル側)</th>
        <th class="col-edit">設定値<br>(マシン側)</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<script>
'use strict';

// ── 設定 ─────────────────────────────────────────────────────────
const LS_GAS_URL = 'gasUrl';
const REFRESH_MS = 5 * 60 * 1000;

let gasUrl = localStorage.getItem(LS_GAS_URL) || '';

// ── State ────────────────────────────────────────────────────────
let allMachines         = [];
let filteredMachines    = [];
let userdata            = {};  // { machineId: {memo, memo_ts, settings, settings_ts} }
let udVersion           = 0;   // Drive の _version (競合検出基準)
let editingFields       = new Set();
let conflictState       = {};  // "id:field" → {serverValue, serverTs}
let nextRefreshAt       = 0;
let adminSettingsLoaded = false;

// ── GAS REST ブリッジ ─────────────────────────────────────────────

async function gasGet(action, params = {}) {
  if (!gasUrl) throw new Error('GAS URL が設定されていません');
  const url = new URL(gasUrl);
  url.searchParams.set('action', action);
  for (const [k, v] of Object.entries(params)) url.searchParams.set(k, String(v));
  const r = await fetch(url.toString(), { redirect: 'follow' });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const json = await r.json();
  if (json && json.error) throw new Error(json.error);
  return json;
}

async function gasPost(action, params = {}) {
  if (!gasUrl) throw new Error('GAS URL が設定されていません');
  const body = new URLSearchParams({ action });
  for (const [k, v] of Object.entries(params)) body.set(k, String(v));
  // application/x-www-form-urlencoded は Simple Request → CORS プリフライトなし
  const r = await fetch(gasUrl, { method: 'POST', body, redirect: 'follow' });
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const json = await r.json();
  if (json && json.error) throw new Error(json.error);
  return json;
}

// ── 設定 UI ──────────────────────────────────────────────────────

function openSettings() {
  el('gasUrlInput').value       = gasUrl;
  el('tokenSettingInput').value = '';
  el('connStatus').innerHTML    = '';
  el('closeSettingsBtn').style.display = gasUrl ? '' : 'none';
  el('settingsOverlay').classList.add('open');
}

function closeSettings() {
  el('settingsOverlay').classList.remove('open');
}

async function saveSettings() {
  const newUrl   = el('gasUrlInput').value.trim();
  const newToken = el('tokenSettingInput').value.trim();

  if (!newUrl) {
    setConnStatus('error', 'GAS URL を入力してください');
    return;
  }
  if (!newUrl.includes('script.google.com')) {
    setConnStatus('error', 'URL が正しくありません (script.google.com を含む URL を入力)');
    return;
  }

  gasUrl = newUrl;
  localStorage.setItem(LS_GAS_URL, gasUrl);

  el('saveSettingsBtn').disabled    = true;
  el('saveSettingsBtn').textContent = '接続テスト中...';
  setConnStatus('', '');

  try {
    // トークンが入力されていれば先に保存
    if (newToken) {
      await gasPost('saveToken', { token: newToken });
    }

    // 接続テスト兼初期データ取得
    const data = await gasGet('getData');
    setConnStatus('ok', `✅ 接続成功 (マシン ${data.machines?.length ?? 0} 台)`);

    applyServerData(data, true);
    el('closeSettingsBtn').style.display = '';
    updateGasIndicator();

    // 少し待ってから閉じる
    setTimeout(closeSettings, 1200);

  } catch (e) {
    setConnStatus('error', `❌ 接続失敗: ${e.message}`);
  } finally {
    el('saveSettingsBtn').disabled    = false;
    el('saveSettingsBtn').textContent = '保存して接続テスト';
  }
}

function setConnStatus(type, msg) {
  const s = el('connStatus');
  if (!msg) { s.innerHTML = ''; return; }
  const color = type === 'ok' ? 'var(--green)' : 'var(--red)';
  s.innerHTML = `<span style="color:${color};font-size:12px">${esc(msg)}</span>`;
}

function updateGasIndicator() {
  // ヘッダータイトル横にインジケーターは不要 (設定ボタンで確認できるため省略)
}

// ── 初期化 ──────────────────────────────────────────────────────

async function init() {
  if (!gasUrl) {
    openSettings();
    return;
  }

  showSpinner('データを読み込み中...');
  try {
    const data = await gasGet('getData');
    applyServerData(data, true);
    if (!data.machines || data.machines.length === 0) {
      setEmptyMsg('データがありません。「データ取得」ボタンを押してください。');
    }
  } catch (e) {
    setEmptyMsg(`読み込みエラー: ${e.message}`);
  }
  hideSpinner();
  startAutoRefresh();
  loadAdminSettings();
}

// ── サーバーデータ適用 ───────────────────────────────────────────

function applyServerData(data, isInitial) {
  if (data.machines && data.machines.length > 0) {
    allMachines = data.machines;
  }
  if (data.userdata) {
    mergeUserdata(data.userdata, data.userdataVersion || 0);
  }
  if (data.fetchedAt) {
    el('lastUpdated').textContent = '最終更新: ' + fmtTs(data.fetchedAt);
  }
  if (allMachines.length > 0 && (isInitial || editingFields.size === 0)) {
    buildGroupFilter();
    // getData はキャッシュから設定値をマージ済みの場合がある
    if (!adminSettingsLoaded && allMachines.some(m => m.machine_base_settings)) {
      adminSettingsLoaded = true;
    }
    applyFilters();
    showTable();
  }
}

// ── ユーザーデータのマージ ───────────────────────────────────────

function mergeUserdata(newUd, newVersion) {
  for (const [machineId, fields] of Object.entries(newUd)) {
    if (machineId === '_version') continue;
    if (!userdata[machineId]) userdata[machineId] = {};

    for (const field of ['memo', 'settings']) {
      const tsKey    = `${field}_ts`;
      const serverTs = fields[tsKey] || 0;
      const localTs  = userdata[machineId][tsKey] || 0;
      const key      = `${machineId}:${field}`;

      if (serverTs > localTs && !editingFields.has(key) && !conflictState[key]) {
        userdata[machineId][field]  = fields[field] || '';
        userdata[machineId][tsKey]  = serverTs;
        updateFieldDOM(machineId, field, fields[field] || '', serverTs);
      }
    }
  }
  udVersion = newVersion;
}

function updateFieldDOM(machineId, field, value, ts) {
  const ta = document.querySelector(`textarea[data-id="${machineId}"][data-field="${field}"]`);
  if (ta) ta.value = value;
  const tsEl = el(`ts_${machineId}_${field}`);
  if (tsEl) tsEl.textContent = ts ? '最終更新: ' + fmtTs(ts) : '';
}

// ── 手動データ取得 ───────────────────────────────────────────────

async function fetchAndUpdate() {
  if (!gasUrl) { openSettings(); return; }
  setFetching(true);
  clearAlert();
  try {
    const data = await gasPost('fetchMachines', {});
    allMachines = data.machines || [];
    if (data.fetchedAt) el('lastUpdated').textContent = '最終更新: ' + fmtTs(data.fetchedAt);
    buildGroupFilter();
    adminSettingsLoaded = false;
    applyFilters();
    showTable();
    resetCountdown();
    loadAdminSettings();
  } catch (e) {
    showAlert('エラー: ' + e.message);
  } finally {
    setFetching(false);
  }
}

// ── 自動更新 (5 分) ──────────────────────────────────────────────

function startAutoRefresh() {
  resetCountdown();
  setInterval(async () => {
    if (Date.now() >= nextRefreshAt) {
      resetCountdown();
      try {
        const data = await gasGet('getData');
        applyServerData(data, false);
      } catch (_) {}
    }
  }, 60_000);

  setInterval(() => {
    const rem = Math.max(0, Math.floor((nextRefreshAt - Date.now()) / 1000));
    el('countdown').textContent =
      `次の更新: ${Math.floor(rem / 60)}:${String(rem % 60).padStart(2, '0')}`;
  }, 1000);
}

function resetCountdown() { nextRefreshAt = Date.now() + REFRESH_MS; }

// ── テーブルレンダリング ─────────────────────────────────────────

function renderTable() {
  const tbody = el('tableBody');

  tbody.innerHTML = filteredMachines.map(m => {
    const cm = m.crane_machine;
    const id = m.id;
    const ud = userdata[id] || {};
    return `<tr>
      <td class="col-booth"><span class="booth-id">${esc(cm?.booth_id || '-')}</span></td>
      <td class="col-type">${cellType(m)}</td>
      <td class="col-gameplay">${esc(m.gameplay_type_name || '-')}</td>
      <td class="col-mode">${cellMode(m)}</td>
      <td class="col-dir">${cellDir(cm)}</td>
      <td class="col-state">${cellState(m.state)}</td>
      <td class="col-conn">${cellConn(cm)}</td>
      <td class="col-err">${cellErr(cm)}</td>
      <td class="col-res">${cellRes(m)}</td>
      <td class="col-edit">${editCell(id, 'memo',     ud)}</td>
      <td class="col-admin-settings">${cellAdminSettings(m)}</td>
      <td class="col-edit">${editCell(id, 'settings', ud)}</td>
    </tr>`;
  }).join('');

  // textarea の値は innerHTML では設定できないため JS で設定
  filteredMachines.forEach(m => {
    const ud = userdata[m.id] || {};
    ['memo', 'settings'].forEach(f => {
      const ta = tbody.querySelector(`textarea[data-id="${m.id}"][data-field="${f}"]`);
      if (ta) ta.value = ud[f] || '';
    });
  });

  // 競合状態を復元
  for (const [key, cf] of Object.entries(conflictState)) {
    const [mid, f] = key.split(':');
    showConflictBox(mid, f, cf);
  }

  // イベント登録
  tbody.querySelectorAll('.editable').forEach(ta => {
    let timer;
    ta.addEventListener('focus', () => editingFields.add(`${ta.dataset.id}:${ta.dataset.field}`));
    ta.addEventListener('input', () => {
      clearTimeout(timer);
      timer = setTimeout(() => doSave(ta), 800);
    });
    ta.addEventListener('blur', () => {
      clearTimeout(timer);
      editingFields.delete(`${ta.dataset.id}:${ta.dataset.field}`);
      doSave(ta);
    });
  });
  tbody.querySelectorAll('.btn-cf-force').forEach(b =>
    b.addEventListener('click', () => resolveConflict(b.dataset.id, b.dataset.field, 'force')));
  tbody.querySelectorAll('.btn-cf-revert').forEach(b =>
    b.addEventListener('click', () => resolveConflict(b.dataset.id, b.dataset.field, 'revert')));
}

function editCell(id, field, ud) {
  const ts = ud[`${field}_ts`] || 0;
  return `
    <textarea class="editable" data-id="${id}" data-field="${field}" rows="2" spellcheck="false"></textarea>
    <div class="field-ts" id="ts_${id}_${field}">${ts ? '最終更新: ' + fmtTs(ts) : ''}</div>
    <div class="conflict-box" id="cf_${id}_${field}" style="display:none;">
      <div class="cf-header">⚠️ 競合 — <span class="cf-ts-label"></span> に他のPCが保存</div>
      <div class="cf-server-val"></div>
      <div class="cf-btns">
        <button class="btn-cf btn-cf-force"  data-id="${id}" data-field="${field}">上書き保存</button>
        <button class="btn-cf btn-cf-revert" data-id="${id}" data-field="${field}">サーバー値を使用</button>
      </div>
    </div>`;
}

// ── フィールド保存 ───────────────────────────────────────────────

async function doSave(ta) {
  const machineId = ta.dataset.id;
  const field     = ta.dataset.field;
  const value     = ta.value;
  if (value === (userdata[machineId]?.[field] ?? '')) return; // 変更なし

  try {
    const result = await gasPost('saveField', {
      machineId, field, value, clientVersion: udVersion
    });

    if (result.conflict) {
      showConflictBox(machineId, field, result);
      conflictState[`${machineId}:${field}`] = result;
      ta.style.borderColor = 'var(--orange)';
    } else {
      if (!userdata[machineId]) userdata[machineId] = {};
      userdata[machineId][field]          = value;
      userdata[machineId][`${field}_ts`]  = result.ts;
      udVersion = result.newVersion;
      updateTsLabel(machineId, field, result.ts);
      hideConflictBox(machineId, field);
      ta.style.borderColor = '';
      flashSaved(ta);
    }
  } catch (e) {
    console.error('Save error:', e.message);
    ta.style.borderColor = 'var(--red)';
    setTimeout(() => { ta.style.borderColor = ''; }, 3000);
  }
}

// ── 競合解決 ────────────────────────────────────────────────────

async function resolveConflict(machineId, field, action) {
  const ta = document.querySelector(`textarea[data-id="${machineId}"][data-field="${field}"]`);
  const cf = conflictState[`${machineId}:${field}`];

  if (action === 'revert') {
    if (ta && cf) {
      ta.value = cf.serverValue || '';
      userdata[machineId] ??= {};
      userdata[machineId][field]          = cf.serverValue || '';
      userdata[machineId][`${field}_ts`]  = cf.serverTs;
      updateTsLabel(machineId, field, cf.serverTs);
    }
    hideConflictBox(machineId, field);
    if (ta) ta.style.borderColor = '';
  } else {
    if (!ta) return;
    try {
      const result = await gasPost('forceSaveField', { machineId, field, value: ta.value });
      if (result.ok) {
        userdata[machineId] ??= {};
        userdata[machineId][field]          = ta.value;
        userdata[machineId][`${field}_ts`]  = result.ts;
        udVersion = result.newVersion;
        updateTsLabel(machineId, field, result.ts);
        hideConflictBox(machineId, field);
        ta.style.borderColor = '';
        flashSaved(ta);
      }
    } catch (e) { console.error('Force save error:', e.message); }
  }
}

function showConflictBox(machineId, field, cf) {
  const box = el(`cf_${machineId}_${field}`);
  if (!box) return;
  box.querySelector('.cf-ts-label').textContent  = fmtTs(cf.serverTs);
  box.querySelector('.cf-server-val').textContent = cf.serverValue || '(空)';
  box.style.display = 'block';
}

function hideConflictBox(machineId, field) {
  const box = el(`cf_${machineId}_${field}`);
  if (box) box.style.display = 'none';
  delete conflictState[`${machineId}:${field}`];
}

function updateTsLabel(machineId, field, ts) {
  const e = el(`ts_${machineId}_${field}`);
  if (e) e.textContent = '最終更新: ' + fmtTs(ts);
}

function flashSaved(ta) {
  ta.classList.remove('saved');
  void ta.offsetWidth;
  ta.classList.add('saved');
}

// ── フィルター / 統計 ────────────────────────────────────────────

function buildGroupFilter() {
  const groups = [...new Set(allMachines.map(m => m.group_label).filter(Boolean))].sort();
  const sel = el('fGroup');
  sel.innerHTML = '<option value="">全て</option>';
  groups.forEach(g => {
    const o = document.createElement('option');
    o.value = o.textContent = g;
    sel.appendChild(o);
  });
}

function applyFilters() {
  const fg = el('fGroup').value;
  const fs = el('fState').value;
  const fc = el('fConn').value;
  const ft = el('fType').value;

  filteredMachines = allMachines.filter(m => {
    if (fg && m.group_label           !== fg) return false;
    if (fs && m.state                 !== fs) return false;
    if (fc && m.crane_machine?.status !== fc) return false;
    if (ft && m.machine_type          !== ft) return false;
    return true;
  });
  renderTable();
  updateStats();
}

function updateStats() {
  const ms = filteredMachines;
  el('sTotal').textContent = ms.length;
  el('sFree').textContent  = ms.filter(m => m.state === 'FREE').length;
  el('sMaint').textContent = ms.filter(m => m.state === 'UNDER_MAINTENANCE').length;
  el('sConn').textContent  = ms.filter(m => m.crane_machine?.status === 'CONNECTED').length;
  el('sDisc').textContent  = ms.filter(m => m.crane_machine?.status === 'DISCONNECTED').length;
}

// ── CSV エクスポート ─────────────────────────────────────────────

function exportCSV() {
  if (!filteredMachines.length) { alert('データがありません'); return; }
  const H = ['ブース番号','タイプ','遊び方名','モード','向き','マシン状態','接続状態',
             'エラーコード','ストリーマー予約','メモ','設定値(管理パネル側)','設定値(マシン側)',
             'メモ最終更新','設定値最終更新'];
  const rows = filteredMachines.map(m => {
    const cm = m.crane_machine;
    const ud = userdata[m.id] || {};
    const adminSettings = filterAdminSettings(m.machine_base_settings, m.machine_type)
      .map(p => `${p.param_name}: ${p.current_param}`).join('\n');
    return [
      cm?.booth_id || '',
      m.machine_type === 'TWO_CLAWS' ? '2爪' : '3爪',
      m.gameplay_type_name || '',
      m.mode_type ? m.mode_type.split('_')[0] : '',
      cm?.direction === 'LEFT' ? '左' : cm?.direction === 'RIGHT' ? '右' : '',
      { FREE:'空き', UNDER_MAINTENANCE:'メンテ中', PLAYING:'プレイ中' }[m.state] || m.state,
      cm?.status === 'CONNECTED' ? '接続中' : '切断',
      cm?.error_code || '',
      m.reserved_for_streamer ? 'あり' : '',
      ud.memo     || '',
      adminSettings,
      ud.settings || '',
      ud.memo_ts     ? fmtTs(ud.memo_ts)     : '',
      ud.settings_ts ? fmtTs(ud.settings_ts) : '',
    ];
  });
  const csv = [H, ...rows]
    .map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(','))
    .join('\r\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8;'}));
  a.download = `machines_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// ── セルレンダリング ─────────────────────────────────────────────

function cellType(m) {
  return m.machine_type === 'TWO_CLAWS'
    ? '<span class="type-two">2爪</span>'
    : '<span class="type-three">3爪</span>';
}
function cellDir(cm) {
  if (!cm) return '-';
  if (cm.direction === 'LEFT')  return '<span class="dir-left">← 左</span>';
  if (cm.direction === 'RIGHT') return '<span class="dir-right">右 →</span>';
  return '-';
}
function cellState(state) {
  const m = { FREE:['badge-free','空き'], UNDER_MAINTENANCE:['badge-maint','メンテ中'], PLAYING:['badge-play','プレイ中'] };
  const [c, l] = m[state] || ['', state];
  return `<span class="badge ${c}">${esc(l)}</span>`;
}
function cellConn(cm) {
  if (!cm) return '-';
  const ok = cm.status === 'CONNECTED';
  return `<span class="conn-wrap"><span class="conn-dot ${ok?'dot-conn':'dot-disc'}"></span>${ok?'接続中':'切断'}</span>`;
}
function cellErr(cm) {
  const c = cm?.error_code;
  return (!c || c === 'UNKNOWN')
    ? '<span class="no-err">-</span>'
    : `<span class="has-err">${esc(c)}</span>`;
}
function cellMode(m) {
  if (!m.mode_type) return '<span style="color:var(--dim)">-</span>';
  const mode = m.mode_type.split('_')[0];
  const cls  = mode === 'PVP' ? 'mode-pvp' : 'mode-pve';
  return `<span class="${cls}">${esc(mode)}</span>`;
}
function cellRes(m) {
  return m.reserved_for_streamer
    ? '<span class="res-yes">● 予約中</span>'
    : '<span class="res-no">-</span>';
}
function filterAdminSettings(s, machineType) {
  if (!s || !s.length) return [];
  const isTwo = machineType === 'TWO_CLAWS';
  // 1-indexed: TIME_OUT(1)は共通。2本爪=1+10~15、3本爪=1~9
  return s.filter((_, i) => {
    const pos = i + 1;
    return isTwo ? (pos === 1 || (pos >= 10 && pos <= 15))
                 : (pos >= 1 && pos <= 9);
  });
}

function cellAdminSettings(m) {
  if (!adminSettingsLoaded) {
    return '<span style="color:var(--dim);font-size:10px">読込中...</span>';
  }
  const params = filterAdminSettings(m.machine_base_settings, m.machine_type);
  if (!params.length) return '<span style="color:var(--dim);font-size:11px">-</span>';
  const text = params.map(p => `${p.param_name}: ${p.current_param}`).join('\n');
  return `<div class="admin-settings-cell">${esc(text)}</div>`;
}

// ── 管理パネル設定値の非同期ロード ───────────────────────────────

async function loadAdminSettings() {
  if (!gasUrl || adminSettingsLoaded) return;
  try {
    // まずキャッシュ (machine_settings.json) を確認
    const cached = await gasGet('getSettings');
    if (cached && Object.keys(cached).length > 0) {
      applySettingsMap(cached);
      return;
    }
    // キャッシュが空なら API から取得 (時間がかかる)
    setSettingsStatus('設定値をAPIから取得中...');
    const fresh = await gasPost('fetchSettings', {});
    applySettingsMap(fresh);
  } catch (e) {
    console.error('設定値ロードエラー:', e.message);
    adminSettingsLoaded = true;
    applyFilters();
  }
  clearSettingsStatus();
}

async function fetchAdminSettings() {
  if (!gasUrl) { openSettings(); return; }
  const btn = el('fetchSettingsBtn');
  btn.disabled = true;
  btn.textContent = '取得中...';
  setSettingsStatus('設定値をAPIから取得中...');
  adminSettingsLoaded = false;
  applyFilters();
  try {
    const map = await gasPost('fetchSettings', {});
    applySettingsMap(map);
  } catch (e) {
    showAlert('設定値取得エラー: ' + e.message);
    adminSettingsLoaded = true;
    applyFilters();
  } finally {
    btn.disabled = false;
    btn.textContent = '設定値更新';
    clearSettingsStatus();
  }
}

function applySettingsMap(map) {
  if (!map || map.error) {
    adminSettingsLoaded = true;
    applyFilters();
    return;
  }
  allMachines.forEach(m => {
    if (map[m.id]) m.machine_base_settings = map[m.id];
  });
  adminSettingsLoaded = true;
  applyFilters();
}

function setSettingsStatus(msg) {
  el('countdown').textContent = msg;
}
function clearSettingsStatus() {
  // カウントダウン表示を復元
  const rem = Math.max(0, Math.floor((nextRefreshAt - Date.now()) / 1000));
  el('countdown').textContent =
    `次の更新: ${Math.floor(rem / 60)}:${String(rem % 60).padStart(2, '0')}`;
}

// ── UI helpers ───────────────────────────────────────────────────

function showTable() {
  el('emptyState').style.display = 'none';
  el('mainTable').style.display  = 'table';
  el('filterBar').style.display  = 'flex';
  el('statsBar').style.display   = 'flex';
}
function showSpinner(msg) {
  el('spinner').style.display = 'block';
  el('emptyMsg').textContent  = msg;
  el('emptyState').style.display = 'block';
  el('mainTable').style.display  = 'none';
}
function hideSpinner() { el('spinner').style.display = 'none'; }
function setEmptyMsg(msg) { el('emptyMsg').textContent = msg; }
function setFetching(v) {
  const b = el('fetchBtn');
  b.disabled    = v;
  b.textContent = v ? '取得中...' : 'データ取得';
}
function showAlert(msg) {
  const b = el('alertBox');
  b.textContent = msg; b.style.display = 'block';
}
function clearAlert() { el('alertBox').style.display = 'none'; }
function el(id) { return document.getElementById(id); }
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtTs(ts) {
  if (!ts) return '-';
  const d = new Date(ts), p = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}/${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;
}

// ── 起動 ─────────────────────────────────────────────────────────
init();
</script>
